services:
  web:
    image: node:20-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @podcast-hub/web dev"
    volumes:
      - ./:/workspace
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - api

  api:
    image: node:20-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @podcast-hub/api dev"
    volumes:
      - ./:/workspace
    env_file:
      - ./.env
    environment:
      RUNNER_BASE_URL: http://runner:4300
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
      - mailpit

  worker:
    image: node:20-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @podcast-hub/worker dev"
    volumes:
      - ./:/workspace
    env_file:
      - ./.env
    depends_on:
      - redis
      - postgres

  runner:
    image: node:20-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @podcast-hub/runner dev"
    volumes:
      - ./:/workspace
    env_file:
      - ./.env
    ports:
      - "4300:4300"
    depends_on:
      - redis
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: podcast_hub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  caddy:
    image: caddy:2.8-alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - web
      - api

volumes:
  postgres_data:
  minio_data:
